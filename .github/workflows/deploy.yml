name: Deploy

# Auto-deploy till Cloudflare vid merge/push till main.
on:
  push:
    branches: [main]

# Ett deploy i taget; avbryt inte pågående deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

      # 1) Deploya Workern (skapar den vid första körningen).
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # 2) Synka Workerns runtime-hemligheter (idempotent, persistar mellan deploys).
      - name: Sync worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          put() { # put <NAMN> <värde> – sätter bara om värdet finns
            if [ -n "$2" ]; then printf '%s' "$2" | npx wrangler secret put "$1"; else echo "$1 ej satt – hoppar över"; fi
          }
          put APISPORTS_KEY "$APISPORTS_KEY"
          put SLACK_WEBHOOK_URL "$SLACK_WEBHOOK_URL"
          put GOOGLE_GENERATIVE_AI_API_KEY "$GOOGLE_GENERATIVE_AI_API_KEY"
          put SLACK_SIGNING_SECRET "$SLACK_SIGNING_SECRET"
          put SLACK_BOT_TOKEN "$SLACK_BOT_TOKEN"
